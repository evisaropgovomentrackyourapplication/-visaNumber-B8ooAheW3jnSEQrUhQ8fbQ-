<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Inside Image Overlay</title>
    <!-- Importing Font Awesome for the home icon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* Reset default margins */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f9; /* Outer background color for testing page */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* -----------------------------------------------------------------
           MAIN BACKGROUND IMAGE BOX CONTAINER
        ----------------------------------------------------------------- */
        .image-container-wrapper {
            position: relative;       /* Anchor point: Forces all code contents to stay INSIDE */
            width: 800px;             /* Change this value to adjust your overall graphic width */
            height: 1000px;            /* Change this value to adjust your overall graphic height */
            border-radius: 12px;
            overflow: hidden;         
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        /* The background image element */
        .image-container-wrapper .bg-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;        /* Prevents your photo distortion or squishing */
            display: block;
        }

        /* -----------------------------------------------------------------
           DROPDOWN INTERFACE (Layered on top of the photo)
        ----------------------------------------------------------------- */
        .dropdown {
            position: absolute;       /* Lifts the code layer straight onto the graphic space */
            top: 13px;                /* Controls padding distance from top boundary edge */
            left: 355px;               /* Controls padding distance from left boundary edge */
            display: inline-block;
            z-index: 10;
        }

        /* The menu trigger button */
        .dropbtn {
            background-color: #4361ee;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Hide links by default */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: transparent; 
            z-index: 200;
            right: 30px;
            top: 100%;
        }

        /* Toggle class to show links via JavaScript */
        .show {
            display: block;
        }

        /* The Blue Sidebar Menu Frame */
        .sidebar-wrapper {
            background-color: #4361ee; 
            width: 350px;             
            border-radius: 8px; 
            box-shadow: 0px 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
            margin-top: 8px; 
        }

        .menu-container {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px; 
        }

        .home-icon {
            font-size: 29px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;   
            align-self: flex-start;
            margin-bottom: 10px;
        }

        .menu-item {
            color: white;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600; 
            letter-spacing: 0.3px;
            cursor: pointer;          
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .menu-item .arrow-icon {
            font-size: 12px;
        }

        .submenu-container {
            display: none;            
            flex-direction: column;
            gap: 160px;
            margin-top: -4px;        
        }

        .submenu-container.show {
            display: flex;
        }

        .submenu-item {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            margin-left: 45px; 
            transition: opacity 0.2s ease;
        }

        .submenu-item:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Outer Image Container Wrapper Box -->
    <div class="image-container-wrapper">
        
        <!-- 1. THE BACKGROUND PICTURE LAYER -->
        <!-- Replace this link with your local asset location path (e.g. src="scenery.jpg") -->
              <img src="AYNALEiM.jpg" alt="A brief description of your picture" width="420" height="800">

        <!-- 2. THE DROPDOWN CODE LAYER (Forced inside the image zone area) -->
        <div class="dropdown">
            
            <!-- Press Button Option -->
            <button onclick="toggleMenu()" class="dropbtn">▾</button>
            
            <!-- Hidden dropdown block box slots -->
            <div id="myDropdown" class="dropdown-content">
                
                <div class="sidebar-wrapper">
                    <div class="menu-container">
                        <a href="#" class="home-icon"><i class="fa-solid fa-house"></i></a>

                        <a href="#" class="menu-item">Know your Visa Type</a>
                        <a href="#" class="menu-item">Track Your Application</a>
                        <a href="#" class="menu-item">Share Your Experience</a>
                       <a href="#" class="menu-item">Contact Us</a>
                        <a href="#" class="menu-item">Frequently Asked Questions</a>
                        
                        <div class="menu-item" onclick="toggleSubMenu(event)">
                            <span>Login</span>
                            <span class="arrow-icon">▾</span>
                        </div>

                        <div id="loginSubmenu" class="submenu-container">
                            <a href="#" class="submenu-item">Tourist</a>
                            <a href="#" class="submenu-item">PRO / Sponsor</a>
                        </div>
                    </div>
                </div>

            </div>
        </div> <!-- End Dropdown Layer -->

    </div> <!-- End Image Wrapper Container -->

    <script>
        // Open/Close master resources dropdown menu block
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Expand inner user subcategories layout 
        function toggleSubMenu(event) {
            event.stopPropagation(); // Prevents clicking login from hiding parent frame
            var submenu = document.getElementById("loginSubmenu");
            submenu.classList.toggle("show");
        }

        // Close layout if user taps on external webpage pixels outside layout limits
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn') && !event.target.closest('.dropdown-content')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>

</body>
</html>
