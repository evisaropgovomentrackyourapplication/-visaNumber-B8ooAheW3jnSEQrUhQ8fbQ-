<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <!-- FIX 1: Reset the initial scale back to standard 1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Inside Image Overlay</title>
    <!-- Importing Font Awesome for the home icon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* Reset default margins */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f6f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligns to top for better scrolling on small displays */
        }

        /* -----------------------------------------------------------------
           MAIN BACKGROUND IMAGE BOX CONTAINER
        ----------------------------------------------------------------- */
        .image-container-wrapper {
            position: relative;       
            /* FIX 2: Set responsive structural sizes instead of rigid 800px x 1000px */
            width: 100%;             
            max-width: 500px; /* Limits size on wider monitor screens */
            min-height: 100vh; /* Expands container to take the full viewport height */
            background-color: #ffffff;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            overflow-x: hidden;
        }

        /* The background image element */
        .image-container-wrapper .bg-photo {
            width: 100%;
            height: auto;
            display: block;
        }

        /* -----------------------------------------------------------------
           DROPDOWN INTERFACE (Layered on top of the photo)
        ----------------------------------------------------------------- */
        .dropdown {
            position: absolute;       
            top: 15px;                
            /* FIX 3: Swapped fixed left offset to right anchoring for flexible phone screens */
            right: 15px;               
            display: inline-block;
            z-index: 10;
        }

        /* The menu trigger button */
        .dropbtn {
            background-color: #4361ee;
            color: white;
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Hide links by default */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: transparent; 
            z-index: 200;
            right: 0;
            top: 100%;
        }

        /* Toggle class to show links via JavaScript */
        .show {
            display: block;
        }

        /* The Blue Sidebar Menu Frame */
        .sidebar-wrapper {
            background-color: #4361ee; 
            /* FIX 4: Replaced static 350px width with max-width rules for small viewports */
            width: 85vw;             
            max-width: 320px;
            border-radius: 8px; 
            box-shadow: 0px 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
            margin-top: 8px; 
        }

        .menu-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px; 
        }

        .home-icon {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;   
            align-self: flex-start;
            margin-bottom: 5px;
        }

        .menu-item {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600; 
            letter-spacing: 0.3px;
            cursor: pointer;          
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .menu-item .arrow-icon {
            font-size: 12px;
        }

        /* FIX 5: Reduced massive layout gap from 160px down to clean spacing */
        .submenu-container {
            display: none;            
            flex-direction: column;
            gap: 15px;
            margin-top: 5px;        
        }

        .submenu-container.show {
            display: flex;
        }

        .submenu-item {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            margin-left: 20px; 
            transition: opacity 0.2s ease;
        }

        .submenu-item:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Outer Image Container Wrapper Box -->
    <div class="image-container-wrapper">
        
        <!-- 1. THE BACKGROUND PICTURE LAYER -->
        <!-- FIX 6: Removed static width/height attributes and assigned class="bg-photo" for fluid scaling -->
        <img src="AYNALEiM.jpg" alt="Visa Details" class="bg-photo">

        <!-- 2. THE DROPDOWN CODE LAYER (Forced inside the image zone area) -->
        <div class="dropdown">
            
            <!-- Press Button Option -->
            <button onclick="toggleMenu()" class="dropbtn">▾</button>
            
            <!-- Hidden dropdown block box slots -->
            <div id="myDropdown" class="dropdown-content">
                
                <div class="sidebar-wrapper">
                    <div class="menu-container">
                        <a href="#" class="home-icon"><i class="fa-solid fa-house"></i></a>

                        <a href="#" class="menu-item">Know your Visa Type</a>
                        <a href="#" class="menu-item">Track Your Application</a>
                        <a href="#" class="menu-item">Share Your Experience</a>
                        <a href="#" class="menu-item">Contact Us</a>
                        <a href="#" class="menu-item">Frequently Asked Questions</a>
                        
                        <div class="menu-item" onclick="toggleSubMenu(event)">
                            <span>Login</span>
                            <span class="arrow-icon">▾</span>
                        </div>

                        <div id="loginSubmenu" class="submenu-container">
                            <a href="#" class="submenu-item">Tourist</a>
                            <a href="#" class="submenu-item">PRO / Sponsor</a>
                        </div>
                    </div>
                </div>

            </div>
        </div> <!-- End Dropdown Layer -->

    </div> <!-- End Image Wrapper Container -->

    <script>
        // Open/Close master resources dropdown menu block
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Expand inner user subcategories layout 
        function toggleSubMenu(event) {
            event.stopPropagation(); // Prevents clicking login from hiding parent frame
            var submenu = document.getElementById("loginSubmenu");
            submenu.classList.toggle("show");
        }

        // Close layout if user taps on external webpage pixels outside layout limits
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn') && !event.target.closest('.dropdown-content')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>

</body>
</html>
